<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Split</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg-body: #F9FAFB;
      --bg-surface: #FFFFFF;
      --border-light: #F3F4F6;
      --border-base: #E5E7EB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --primary: #3B82F6; 
      --primary-hover: #2563EB;
      --secondary: #FFFFFF;
      --secondary-hover: #F9FAFB;
      --danger: #EF4444;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard-header { max-width: 100%; margin: 0 auto 24px auto; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .title-area { display: flex; align-items: center; gap: 12px; }
    .title-area i { font-size: 28px; color: var(--primary); }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    
    .actions { display: flex; gap: 10px; }
    input[type="file"] { display: none; }
    
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: var(--secondary); color: var(--text-main); border-color: var(--border-base); box-shadow: var(--shadow-sm); }
    .btn-outline:hover { background: var(--secondary-hover); border-color: #D1D5DB; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-danger { color: var(--danger); border-color: var(--danger); background: transparent; }
    .btn-danger:hover { background: #FEF2F2; }

    .instructions {
      display: flex; gap: 20px; align-items: center; font-size: 13px; color: var(--text-muted);
      background: var(--bg-surface); padding: 12px 20px; border-radius: var(--radius-md); border: 1px solid var(--border-base);
    }

    #workspace {
      max-width: 100%; margin: 0 auto;
      display: grid; grid-template-columns: 450px 1fr; gap: 24px;
      align-items: start;
    }

    /* Left Panel */
    .panel {
      background: var(--bg-surface); border: 1px solid var(--border-base);
      border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-md);
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .panel-title { font-weight: 700; font-size: 16px; }
    
    table.rule-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    table.rule-table th, table.rule-table td { border-bottom: 1px solid var(--border-base); padding: 10px 8px; text-align: left; font-size: 14px; }
    table.rule-table th { font-weight: 600; color: var(--text-muted); padding-bottom: 12px; }
    table.rule-table input { 
        width: 100%; padding: 6px 8px; border: 1px solid var(--border-base); 
        border-radius: 4px; font-family: inherit; font-size: 13px; 
    }
    table.rule-table input:focus { border-color: var(--primary); outline: none; }
    
    /* Right Panel (Preview Cards) */
    .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-base); }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    
    .preview-card {
      border: 1px solid var(--border-base); border-radius: var(--radius-md); overflow: hidden;
      background: #f3f4f6; position: relative; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .preview-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--primary); }
    .preview-img { width: 100%; height: 220px; object-fit: contain; background: white; display: block; border-bottom: 1px solid var(--border-base); }
    .preview-info { padding: 10px; font-size: 13px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: white; }
    .preview-pages { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-top: 4px; }

    /* Hover Overlay (돋보기 아이콘) */
    .preview-hover {
      position: absolute; top: 0; left: 0; width: 100%; height: 220px;
      background: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center;
      opacity: 0; transition: opacity 0.2s; color: white; font-size: 36px;
    }
    .preview-card:hover .preview-hover { opacity: 1; }

    .empty-msg { padding: 40px 20px; text-align: center; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .empty-msg i { font-size: 32px; color: #D1D5DB; }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #111827; color: white; padding: 10px 20px; border-radius: 99px; font-size: 14px;
      box-shadow: var(--shadow-md); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 3000;
    }
    #toast.show { opacity: 1; visibility: visible; }

    /* PDF 상세 보기 모달 */
    .modal-overlay {
      display: none; position: fixed; z-index: 2000; left: 0; top: 0;
      width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px); justify-content: center; align-items: center;
    }
    .modal-content-wrapper {
      width: 90%; max-width: 1000px; height: 85vh; background: #fff;
      border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); animation: zoomIn 0.2s ease-out;
    }
    .modal-header {
      padding: 16px 24px; border-bottom: 1px solid var(--border-base);
      display: flex; justify-content: space-between; align-items: center; background: #f9fafb;
    }
    .modal-header h3 { margin: 0; font-size: 18px; color: var(--text-main); font-weight: 700; }
    .modal-close { cursor: pointer; font-size: 28px; color: var(--text-muted); line-height: 1; transition: 0.2s; }
    .modal-close:hover { color: var(--danger); }
    #pdf-iframe { flex: 1; width: 100%; border: none; background: #525659; }

    @keyframes zoomIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <div class="header-top">
      <div class="title-area">
        <i class="ph ph-scissors"></i>
        <h2>PDF Split</h2>
      </div>
      
      <div class="actions">
        <button class="btn btn-outline" style="color: var(--danger); border-color: var(--danger);" onclick="resetAll()">
          <i class="ph ph-arrow-counter-clockwise"></i> 초기화
        </button>
        
        <label for="upload-pdf" class="btn btn-outline">
          <i class="ph ph-file-pdf"></i> 원본 PDF 불러오기
        </label>
        <input type="file" id="upload-pdf" accept=".pdf" />
      </div>
    </div>

    <div class="instructions">
      <span><i class="ph ph-list-numbers"></i> 페이지 입력 예: <strong>1~2</strong> 또는 <strong>1-3</strong> 또는 <strong>4</strong></span>
      <span style="color: #D1D5DB;">|</span>
      <span><i class="ph ph-microsoft-excel-logo"></i> 엑셀 업로드 시 <strong>페이지</strong>, <strong>분할명(PDF)</strong> 열을 인식합니다.</span>
    </div>
  </div>

  <div id="workspace">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">분할 규칙 설정</div>
        <div style="display:flex; gap:8px;">
            <label for="upload-excel" class="btn btn-outline btn-sm" title="엑셀로 일괄 입력">
              <i class="ph ph-file-xls"></i> 엑셀
            </label>
            <input type="file" id="upload-excel" accept=".xlsx, .xls, .csv" />
            <button class="btn btn-outline btn-sm" onclick="addRuleRow()">
              <i class="ph ph-plus"></i> 추가
            </button>
        </div>
      </div>
      
      <table class="rule-table" id="rule-table">
        <thead>
          <tr>
            <th width="35%">페이지</th>
            <th width="50%">분할명(PDF)</th>
            <th width="15%">삭제</th>
          </tr>
        </thead>
        <tbody id="rule-body">
          <tr>
            <td><input type="text" class="input-page" placeholder="예: 1~2"></td>
            <td><input type="text" class="input-name" placeholder="테스트 입력1"></td>
            <td><button class="btn btn-danger btn-sm" onclick="removeRuleRow(this)"><i class="ph ph-trash"></i></button></td>
          </tr>
        </tbody>
      </table>
      
      <button class="btn btn-outline" style="width: 100%; margin-bottom: 12px;" onclick="generatePreview()">
        <i class="ph ph-eye"></i> 분할 결과 미리보기
      </button>
    </div>

    <div class="panel" style="background: var(--bg-body);">
      <div class="preview-header">
        <div class="panel-title" id="original-file-name">원본 파일: 선택되지 않음</div>
        <button class="btn btn-primary" onclick="splitAndSave()" id="btn-save" disabled>
          <i class="ph ph-folder-open"></i> 폴더 선택 및 분할 저장
        </button>
      </div>
      
      <div id="preview-area" class="preview-grid">
        <div class="empty-msg" style="grid-column: 1 / -1;">
          <i class="ph ph-image"></i>
          PDF 파일과 분할 규칙을 입력한 후 '미리보기'를 클릭하세요.
        </div>
      </div>
    </div>
  </div>

  <div id="toast">저장되었습니다!</div>

  <div id="pdf-modal" class="modal-overlay" onclick="closePdfModal()">
    <div class="modal-content-wrapper" onclick="event.stopPropagation();">
      <div class="modal-header">
        <h3 id="modal-title">PDF 로딩 중...</h3>
        <span class="modal-close" onclick="closePdfModal()">&times;</span>
      </div>
      <iframe id="pdf-iframe"></iframe>
    </div>
  </div>

  <script>
    let originalPdfFile = null; 
    let originalPdfDoc = null; 
    let maxPages = 0;

    // [신규 기능] 전체 초기화 함수
    function resetAll() {
      // 1. 변수 초기화
      originalPdfFile = null;
      originalPdfDoc = null;
      maxPages = 0;

      // 2. UI 및 파일 인풋 초기화
      document.getElementById('upload-pdf').value = '';
      document.getElementById('upload-excel').value = '';
      document.getElementById('original-file-name').innerHTML = `원본 파일: 선택되지 않음`;
      document.getElementById('btn-save').disabled = true;

      // 3. 분할 규칙 테이블 초기화 (1개의 빈 행만 남김)
      document.getElementById('rule-body').innerHTML = `
        <tr>
          <td><input type="text" class="input-page" placeholder="예: 1~2"></td>
          <td><input type="text" class="input-name" placeholder="테스트 입력1"></td>
          <td><button class="btn btn-danger btn-sm" onclick="removeRuleRow(this)"><i class="ph ph-trash"></i></button></td>
        </tr>
      `;

      // 4. 미리보기 영역 초기화
      document.getElementById('preview-area').innerHTML = `
        <div class="empty-msg" style="grid-column: 1 / -1;">
          <i class="ph ph-image"></i>
          PDF 파일과 분할 규칙을 입력한 후 '미리보기'를 클릭하세요.
        </div>
      `;

      showToast("모든 설정이 초기화되었습니다.");
    }

    // 1. 원본 PDF 업로드 처리
    document.getElementById('upload-pdf').addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      originalPdfFile = file; 
      document.getElementById('original-file-name').innerHTML = `<i class="ph ph-file-pdf"></i> ${file.name}`;
      
      try {
        const arrayBuffer = await file.arrayBuffer();
        
        // PDF.js 로드 (썸네일 용도)
        const loadingTask = pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) });
        originalPdfDoc = await loadingTask.promise;
        maxPages = originalPdfDoc.numPages;
        
        showToast(`PDF 로드 완료 (총 ${maxPages}페이지)`);
        document.getElementById('btn-save').disabled = false;
        
        if (getRules().length > 0 && getRules()[0].pageStr !== "") {
            generatePreview();
        }
      } catch (err) {
        console.error(err);
        alert('PDF 파일을 읽는 중 오류가 발생했습니다.');
      }
    });

    // 2. 분할 규칙 UI
    function addRuleRow(pageStr = '', nameStr = '') {
      const tbody = document.getElementById('rule-body');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" class="input-page" value="${pageStr}" placeholder="예: 1~2"></td>
        <td><input type="text" class="input-name" value="${nameStr}" placeholder="분할명"></td>
        <td><button class="btn btn-danger btn-sm" onclick="removeRuleRow(this)"><i class="ph ph-trash"></i></button></td>
      `;
      tbody.appendChild(tr);
    }

    function removeRuleRow(button) {
      const tr = button.closest('tr');
      if (document.querySelectorAll('#rule-body tr').length > 1) {
        tr.remove();
      } else {
        tr.querySelector('.input-page').value = '';
        tr.querySelector('.input-name').value = '';
      }
    }

    // 3. 엑셀 업로드 처리
    document.getElementById('upload-excel').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const firstSheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheetName];
        
        const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
        
        if (json.length > 1) {
          document.getElementById('rule-body').innerHTML = ''; 
          
          for (let i = 1; i < json.length; i++) {
            const row = json[i];
            if (row.length === 0) continue;
            
            const pageStr = row[0] ? String(row[0]).trim() : '';
            const nameStr = row[1] ? String(row[1]).trim() : '';
            
            if (pageStr || nameStr) {
              addRuleRow(pageStr, nameStr);
            }
          }
          showToast('엑셀 데이터가 적용되었습니다.');
          e.target.value = ''; 
        }
      };
      reader.readAsArrayBuffer(file);
    });

    // 4. 입력된 규칙 가져오기
    function getRules() {
      const rows = document.querySelectorAll('#rule-body tr');
      const rules = [];
      
      rows.forEach(row => {
        const pageStr = row.querySelector('.input-page').value.trim();
        const nameStr = row.querySelector('.input-name').value.trim();
        
        if (pageStr && nameStr) {
          rules.push({ pageStr, nameStr });
        }
      });
      return rules;
    }

    function parsePageString(pageStr) {
      const pages = new Set();
      const parts = pageStr.split(',').map(p => p.trim());
      
      for (const part of parts) {
        if (part.includes('~') || part.includes('-')) {
          const separator = part.includes('~') ? '~' : '-';
          const [start, end] = part.split(separator).map(num => parseInt(num.trim(), 10));
          if (!isNaN(start) && !isNaN(end) && start <= end) {
            for (let i = start; i <= end; i++) pages.add(i);
          }
        } else {
          const num = parseInt(part, 10);
          if (!isNaN(num)) pages.add(num);
        }
      }
      return Array.from(pages).sort((a, b) => a - b);
    }

    // 5. 썸네일 미리보기 렌더링
    async function generatePreview() {
      if (!originalPdfDoc) {
        alert("먼저 원본 PDF 파일을 업로드해주세요.");
        return;
      }

      const rules = getRules();
      if (rules.length === 0) {
        alert("분할 규칙을 하나 이상 입력해주세요.");
        return;
      }

      const previewArea = document.getElementById('preview-area');
      previewArea.innerHTML = ''; 

      for (let i = 0; i < rules.length; i++) {
        const rule = rules[i];
        const pageNumbers = parsePageString(rule.pageStr);
        
        if (pageNumbers.length === 0) continue;
        
        const firstPageToRender = pageNumbers[0];
        
        if (firstPageToRender < 1 || firstPageToRender > maxPages) {
            continue; 
        }

        const card = document.createElement('div');
        card.className = 'preview-card';
        card.title = "클릭하여 분할된 PDF 내용 확인";
        
        const canvas = document.createElement('canvas');
        canvas.className = 'preview-img';
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'preview-info';
        infoDiv.innerHTML = `
            ${rule.nameStr}.pdf
            <div class="preview-pages">페이지: ${rule.pageStr}</div>
        `;
        
        const hoverDiv = document.createElement('div');
        hoverDiv.className = 'preview-hover';
        hoverDiv.innerHTML = '<i class="ph ph-magnifying-glass-plus"></i>';

        card.appendChild(canvas);
        card.appendChild(infoDiv);
        card.appendChild(hoverDiv);
        previewArea.appendChild(card);

        // 클릭 시 모달 열기 연결
        card.onclick = () => openPdfModal(rule.pageStr, rule.nameStr);

        try {
            const page = await originalPdfDoc.getPage(firstPageToRender);
            const viewport = page.getViewport({ scale: 1.0 });
            
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        } catch(e) {
            console.error("Preview render error", e);
        }
      }
    }

    // [신규 기능] 분할된 PDF 내용을 추출하여 모달 팝업으로 띄우기
    async function openPdfModal(pageStr, nameStr) {
      if (!originalPdfFile) return;
      const pageNumbers = parsePageString(pageStr);
      if (pageNumbers.length === 0) return;

      const modal = document.getElementById('pdf-modal');
      const iframe = document.getElementById('pdf-iframe');
      const title = document.getElementById('modal-title');
      
      title.innerHTML = `<i class="ph ph-spinner ph-spin"></i> PDF 생성 중...`;
      iframe.src = ''; // 이전 뷰 클리어
      modal.style.display = 'flex';

      try {
        const freshArrayBuffer = await originalPdfFile.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(freshArrayBuffer);
        const newPdfDoc = await PDFLib.PDFDocument.create();

        const indicesToCopy = pageNumbers
            .filter(p => p >= 1 && p <= maxPages)
            .map(p => p - 1);

        if (indicesToCopy.length > 0) {
            const copiedPages = await newPdfDoc.copyPages(pdfDoc, indicesToCopy);
            copiedPages.forEach((page) => newPdfDoc.addPage(page));
        }

        const pdfBytes = await newPdfDoc.save();
        
        // 메모리에 Blob을 만들어 Object URL 생성
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);

        title.textContent = `${nameStr}.pdf 미리보기`;
        iframe.src = url;
        
        // 창을 닫을 때 메모리 반환을 위해 url 저장
        iframe.dataset.blobUrl = url;
      } catch (e) {
        console.error(e);
        title.textContent = `PDF 생성 중 오류가 발생했습니다.`;
      }
    }

    // 모달 닫기 및 리소스 해제
    function closePdfModal() {
      const modal = document.getElementById('pdf-modal');
      modal.style.display = 'none';
      
      const iframe = document.getElementById('pdf-iframe');
      if (iframe.dataset.blobUrl) {
          URL.revokeObjectURL(iframe.dataset.blobUrl);
          iframe.dataset.blobUrl = '';
      }
      iframe.src = '';
    }

    // ESC 키를 누르면 모달 닫기
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closePdfModal();
    });

    // 6. 분할 및 로컬 폴더에 저장 (File System Access API)
    async function splitAndSave() {
      if (!originalPdfFile) return alert("원본 PDF가 없습니다.");
      
      const rules = getRules();
      if (rules.length === 0) return alert("저장할 규칙이 없습니다.");

      try {
        const dirHandle = await window.showDirectoryPicker({
            mode: 'readwrite'
        });

        const freshArrayBuffer = await originalPdfFile.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(freshArrayBuffer);

        let successCount = 0;

        for (const rule of rules) {
          const pageNumbers = parsePageString(rule.pageStr);
          if (pageNumbers.length === 0) continue;

          const newPdfDoc = await PDFLib.PDFDocument.create();
          
          const indicesToCopy = pageNumbers
                .filter(p => p >= 1 && p <= maxPages)
                .map(p => p - 1);

          if (indicesToCopy.length === 0) continue;

          const copiedPages = await newPdfDoc.copyPages(pdfDoc, indicesToCopy);
          copiedPages.forEach((page) => newPdfDoc.addPage(page));

          const pdfBytes = await newPdfDoc.save();
          
          // 파일명에 사용할 수 없는 특수문자 및 줄바꿈 제거 (언더스코어로 치환)
          let safeName = rule.nameStr.replace(/[\\/:*?"<>|\r\n]/g, '_').trim();
          
          // 혹시 이름이 완전히 지워졌을 경우를 대비해 임시 이름 부여
          if (!safeName) safeName = `분할파일_${successCount + 1}`; 
          
          // .pdf 확장자가 이미 있는지 대소문자 구분 없이 확인 후 추가
          const fileName = safeName.toLowerCase().endsWith('.pdf') ? safeName : `${safeName}.pdf`;

          const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
          const writable = await fileHandle.createWritable();
          await writable.write(pdfBytes);
          await writable.close();

          successCount++;
        }

        showToast(`${successCount}개의 PDF 분할 저장이 완료되었습니다.`);

      } catch (err) {
        if (err.name === 'AbortError') {
            console.log('User aborted directory selection');
        } else {
            console.error(err);
            alert('파일 저장 중 오류가 발생했습니다. 브라우저가 File System Access API를 지원하는지 확인해주세요.');
        }
      }
    }

    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
