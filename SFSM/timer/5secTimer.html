<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>139회 정보관리기술사 행동 타이머</title>
    <style>
        /* 고급스러운 명조체와 모던한 고딕체 혼합 사용 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Pretendard:wght@300;500;700&display=swap');

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a24 0%, #050508 100%);
            color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .goal-header {
            text-align: center;
            margin-bottom: 5vh;
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50px;
            color: #d4af37; /* 클래식 골드 */
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #ececec;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.1rem;
            color: #888896;
            font-weight: 300;
            margin: 0;
        }

        #timer-container {
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #timer {
            font-family: 'Noto Serif KR', serif;
            font-size: 13rem;
            font-weight: 700;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 0초 도달 시 텍스트 효과 */
        .action-state {
            font-size: 4rem !important;
            color: #d4af37 !important;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5) !important;
            animation: focusIn 0.8s ease-out forwards;
        }

        @keyframes focusIn {
            0% { filter: blur(10px); opacity: 0; transform: scale(0.9); }
            100% { filter: blur(0); opacity: 1; transform: scale(1); }
        }

        .controls {
            margin-top: 5vh;
        }

        button {
            position: relative;
            padding: 16px 50px;
            font-size: 1.2rem;
            font-family: 'Pretendard', sans-serif;
            font-weight: 500;
            color: #d4af37;
            background: transparent;
            border: 1px solid #d4af37;
            border-radius: 4px; /* 각진 형태로 진중함 부여 */
            cursor: pointer;
            letter-spacing: 1px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: rgba(212, 175, 55, 0.1);
            transition: all 0.4s ease;
            z-index: -1;
        }

        button:hover {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.05);
        }

        button:hover::before {
            left: 0;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            border-color: #333340;
            color: #555560;
            cursor: not-allowed;
            box-shadow: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="goal-header">
        <div class="badge">Professional Engineer</div>
        <h1>139회 정보관리기술사</h1>
        <p>망설임은 합격을 늦출 뿐입니다. 5초 뒤, 펜을 쥐십시오.</p>
    </div>
    
    <div id="timer-container">
        <div id="timer">5</div>
    </div>
    
    <div class="controls">
        <button id="startBtn" onclick="startTimer()">결단 및 실행</button>
    </div>

    <script>
        let countdown;
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');

        function startTimer() {
            clearInterval(countdown);
            let timeLeft = 5;
            
            // UI 초기화
            timerDisplay.textContent = timeLeft;
            timerDisplay.className = '';
            timerDisplay.style.opacity = 1;
            
            startBtn.disabled = true;
            startBtn.textContent = "의지 집중 중...";

            // 카운트다운 로직
            countdown = setInterval(() => {
                timeLeft--;
                
                if (timeLeft > 0) {
                    // 숫자가 바뀔 때마다 미세한 깜빡임 효과로 긴장감 부여
                    timerDisplay.style.opacity = 0.5;
                    setTimeout(() => timerDisplay.style.opacity = 1, 50);
                    timerDisplay.textContent = timeLeft;
                } else {
                    // 카운트 종료 시 강력한 행동 촉구 메시지
                    clearInterval(countdown);
                    timerDisplay.textContent = "작성 시작";
                    timerDisplay.className = 'action-state';
                    
                    startBtn.disabled = false;
                    startBtn.textContent = "다시 결단하기";
                }
            }, 1000);
        }
    </script>
</body>
</html>
