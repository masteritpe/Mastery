<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>인터벌 타이머</title>
<style>
  body {
    font-family: 'Noto Sans', Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
  }
  .container {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  h2 {
    font-size: 22px;
    margin-bottom: 15px;
  }
  .time-inputs {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0 20px;
    width: 100%;
    gap: 8px;
  }
  .time-inputs .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }
  .time-inputs label {
    font-size: 14px;
    margin-bottom: 4px;
    font-weight: bold;
  }
  .time-inputs select {
    width: 100%;
    font-size: 16px;
    padding: 6px;
    background: #f9f9f9;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  .timer-display {
    font-size: 48px;
    background: #f0f0f0;
    padding: 20px;
    margin: 20px 0;
    border-radius: 6px;
    min-height: 60px;
    text-align: center;
    color: #2b8be0;
    width: 100%;
  }
  #statusText {
    margin-bottom: 20px;
    font-size: 16px;
  }
  .buttons button {
    padding: 12px;
    margin: 5px 0;
    font-size: 18px;
    width: 100%;
    border: none;
    border-radius: 6px;
    background: #2b8be0;
    color: #fff;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  .buttons button:hover {
    background: #1971c2;
  }
</style>
</head>
<body>

<div class="container">
  
  <h2>인터벌 타이머</h2>

  <div class="time-inputs">
    <div class="input-group">
      <label for="intervalMin">인터벌(분)</label>
      <select id="intervalMin"></select>
    </div>
    <div class="input-group">
      <label for="intervalSec">인터벌(초)</label>
      <select id="intervalSec"></select>
    </div>
    <div class="input-group">
      <label for="intervalCount">횟수</label>
      <select id="intervalCount"></select>
    </div>
  </div>

  <div class="timer-display" id="timerDisplay">00:00</div>
  <div id="statusText">대기 중</div>

  <div class="buttons">
    <button onclick="startInterval()">시작</button>
    <button onclick="pauseTimer()">일시정지</button>
    <button onclick="resetTimer()">초기화</button>
  </div>

</div>

<script>
let timer;
let intervalTime = 0;
const restTime = 5;
let remainingTime = 0;
let intervalTotal = 0;
let currentInterval = 0;
let isPaused = false;
let missionCompleted = false;
let isResting = false;

function populateSelect(id, max, defaultValue=0) {
  const select = document.getElementById(id);
  for(let i=0; i<=max; i++) {
    const option = document.createElement('option');
    option.value = i;
    option.text = i.toString().padStart(2,'0');
    if(i === defaultValue) option.selected = true;
    select.appendChild(option);
  }
}

populateSelect('intervalMin', 100, 1);
populateSelect('intervalSec', 59, 0);
populateSelect('intervalCount', 50, 5);

function formatTime(seconds) {
  const min = String(Math.floor(seconds / 60)).padStart(2,'0');
  const sec = String(seconds % 60).padStart(2,'0');
  return `${min}:${sec}`;
}

function startInterval() {
  const min = parseInt(document.getElementById('intervalMin').value) || 0;
  const sec = parseInt(document.getElementById('intervalSec').value) || 0;
  intervalTime = min * 60 + sec;

  intervalTotal = parseInt(document.getElementById('intervalCount').value) || 1;

  if(intervalTime <= 0 || intervalTotal <= 0) {
    alert("인터벌 시간과 횟수는 0보다 커야 합니다.");
    return;
  }

  resetTimer();
  currentInterval = 0;
  isResting = false;
  startCountdown();
}

function startCountdown() {
  if (!isResting) {
    currentInterval++;
  }

  remainingTime = isResting ? restTime : intervalTime;
  missionCompleted = false;
  isPaused = false;

  updateDisplay();
  updateStatus();

  clearInterval(timer);
  timer = setInterval(() => {
    if (!isPaused) {
      remainingTime--;
      updateDisplay();

      if (remainingTime <= 0) {
        clearInterval(timer);
        if (isResting) {
          isResting = false;
          startCountdown();
        } else {
          if (currentInterval < intervalTotal) {
            isResting = true;
            startCountdown();
          } else {
            showMissionClear();
          }
        }
      }
    }
  }, 1000);
}

function updateDisplay() {
  const display = document.getElementById('timerDisplay');
  if (isResting) {
    display.innerText = `대기 중 ${formatTime(remainingTime)}`;
    display.style.color = '#d97706';
  } else {
    display.innerText = formatTime(remainingTime);
    display.style.color = missionCompleted ? '#d9480f' : '#1a73e8';
  }
}

function updateStatus() {
  const status = document.getElementById('statusText');
  if (missionCompleted) {
    status.innerText = "인터벌 완료";
  } else if (isResting) {
    status.innerText = `대기 중 (인터벌 ${currentInterval} / ${intervalTotal})`;
  } else {
    status.innerText = `인터벌 진행 중 (${currentInterval} / ${intervalTotal})`;
  }
}

function pauseTimer() {
  isPaused = !isPaused;
}

function resetTimer() {
  clearInterval(timer);
  remainingTime = 0;
  currentInterval = 0;
  isPaused = false;
  missionCompleted = false;
  isResting = false;
  document.getElementById('statusText').innerText = "대기 중";
  updateDisplay();
}

function showMissionClear() {
  const display = document.getElementById('timerDisplay');
  display.innerText = "Mission Clear";
  display.style.color = '#d9480f';
  missionCompleted = true;
  document.getElementById('statusText').innerText = "인터벌 완료";
}
</script>

</body>
</html>
