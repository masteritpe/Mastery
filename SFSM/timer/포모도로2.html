<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>포모도르 타이머</title>
<style>
  body {
    font-family: 'Noto Sans', Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
  }
  .container {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  h2 {
    font-size: 22px;
    margin-bottom: 15px;
  }
  .time-inputs {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0 20px;
    width: 100%;
    gap: 8px;
  }
  .time-inputs .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }
  .time-inputs label {
    font-size: 14px;
    margin-bottom: 4px;
    font-weight: bold;
  }
  .time-inputs select {
    width: 100%;
    font-size: 16px;
    padding: 6px;
    background: #f9f9f9;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  .timer-display {
    font-size: 48px;
    background: #f0f0f0;
    padding: 20px;
    margin: 20px 0;
    border-radius: 6px;
    min-height: 60px;
    text-align: center;
    color: #2b8be0;
    width: 100%;
  }
  #statusText {
    margin-bottom: 20px;
    font-size: 16px;
  }
  .buttons button {
    padding: 12px;
    margin: 5px 0;
    font-size: 18px;
    width: 100%;
    border: none;
    border-radius: 6px;
    background: #2b8be0;
    color: #fff;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  .buttons button:hover {
    background: #1971c2;
  }
</style>
</head>
<body>

<div class="container">
  
  <h2>포모도르 타이머</h2>

  <div class="time-inputs">
    <div class="input-group">
      <label for="focusMin">집중(분)</label>
      <select id="focusMin"></select>
    </div>
    <div class="input-group">
      <label for="breakMin">휴식(분)</label>
      <select id="breakMin"></select>
    </div>
    <div class="input-group">
      <label for="cycleCount">반복횟수</label>
      <select id="cycleCount"></select>
    </div>
  </div>

  <div class="timer-display" id="timerDisplay">00:00</div>
  <div id="statusText">대기 중</div>

  <div class="buttons">
    <button onclick="startPomodoro()">시작</button>
    <button onclick="pauseTimer()">일시정지</button>
    <button onclick="resetTimer()">초기화</button>
  </div>

</div>

<script>
let timer;
let focusTime = 0;
let breakTime = 0;
let remainingTime = 0;
let totalCycles = 0;
let currentCycle = 0;
let isPaused = false;
let isBreak = false;
let missionCompleted = false;

function populateSelect(id, max, defaultValue = 0) {
  const select = document.getElementById(id);
  select.innerHTML = ""; 
  for (let i = 0; i <= max; i++) {
    const option = document.createElement('option');
    option.value = i;
    option.text = i.toString().padStart(2, '0');
    if (i === defaultValue) option.selected = true;
    select.appendChild(option);
  }
}

window.onload = () => {
  populateSelect('focusMin', 60, 25);
  populateSelect('breakMin', 30, 5);
  populateSelect('cycleCount', 20, 4);
};

function formatTime(seconds) {
  const min = String(Math.floor(seconds / 60)).padStart(2, '0');
  const sec = String(seconds % 60).padStart(2, '0');
  return `${min}:${sec}`;
}

function startPomodoro() {
  focusTime = parseInt(document.getElementById('focusMin').value) * 60;
  breakTime = parseInt(document.getElementById('breakMin').value) * 60;
  totalCycles = parseInt(document.getElementById('cycleCount').value);

  if (focusTime <= 0 || breakTime <= 0 || totalCycles <= 0) {
    alert("모든 시간을 0보다 크게 설정하세요.");
    return;
  }

  resetTimer();
  currentCycle = 1;
  isBreak = false;
  startCountdown();
}

function startCountdown() {
  remainingTime = isBreak ? breakTime : focusTime;
  missionCompleted = false;
  isPaused = false;
  updateDisplay();
  updateStatus();

  clearInterval(timer);
  timer = setInterval(() => {
    if (!isPaused) {
      remainingTime--;
      if (remainingTime <= 0) {
        clearInterval(timer);
        if (isBreak) {
          if (currentCycle < totalCycles) {
            currentCycle++;
            isBreak = false;
            startCountdown();
          } else {
            showMissionClear();
          }
        } else {
          isBreak = true;
          startCountdown();
        }
      } else {
        updateDisplay();
      }
    }
  }, 1000);
}

function updateDisplay() {
  const display = document.getElementById('timerDisplay');
  if (isBreak) {
    display.innerText = `휴식 ${formatTime(remainingTime)}`;
    display.style.color = '#d97706';
  } else {
    display.innerText = formatTime(remainingTime);
    display.style.color = missionCompleted ? '#d9480f' : '#1a73e8';
  }
}

function updateStatus() {
  const status = document.getElementById('statusText');
  if (missionCompleted) {
    status.innerText = "Pomodoro 완료";
  } else if (isBreak) {
    status.innerText = `휴식 중 (${currentCycle} / ${totalCycles})`;
  } else {
    status.innerText = `집중 중 (${currentCycle} / ${totalCycles})`;
  }
}

function pauseTimer() {
  isPaused = !isPaused;
}

function resetTimer() {
  clearInterval(timer);
  remainingTime = 0;
  currentCycle = 0;
  isPaused = false;
  isBreak = false;
  missionCompleted = false;
  document.getElementById('statusText').innerText = "대기 중";
  updateDisplay();
}

function showMissionClear() {
  const display = document.getElementById('timerDisplay');
  display.innerText = "Mission Clear";
  display.style.color = '#d9480f';
  missionCompleted = true;
  document.getElementById('statusText').innerText = "Pomodoro 완료";
}
</script>

</body>
</html>
